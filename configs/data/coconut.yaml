# COCONut dataset configuration
# Extends base COCO config with COCONut-specific captions and masks
#
# Additional folder structure (extends coco.yaml):
# data/coco/
# ├── panoptic_train2017_masks/        # COCONut panoptic masks
# │   ├── 000000000009.png
# │   └── ...
# ├── panoptic_train2017_captions/     # COCONut annotated captions
# │   ├── 000000000009.txt
# │   └── ...
# └── coconut_pancap_50k.tar           # Downloaded archive

defaults:
  - coco  # inherit base COCO paths
  - _self_

# Dataset configuration
dataset:
  _target_: finetune.data.coconut.dataset.COCONutPanCapDataset

# Collator configuration
collator:
  _target_: finetune.data.coconut.collator.make_collate_fn
  # processor will be passed at runtime via partial

eval_collator:
  _target_: finetune.data.coconut.collator.make_collate_fn
  # processor will be passed at runtime via partial

# COCONut-specific paths
coconut:
  masks_dir: ${..data_dir}/panoptic_train2017_masks
  captions_dir: ${..data_dir}/panoptic_train2017_captions
  ann_file: ${..annotations_dir}/panoptic_train2017.json
  captions_url: https://huggingface.co/datasets/xdeng77/coconut_pancap/resolve/main/caption_train2017.tar?download=true
  captions_tar_path: ${..data_dir}/caption_train2017.tar
  broken_file: ${..data_dir}/broken.txt

  # Deterministic split: first ``n_train`` images by image id go to train,
  # everything after that goes to validation. The same split is used for
  # the training pipeline and for the post-training saliency evaluation
  # script, so reported metrics are computed on images the model has
  # never seen.
  split:
    n_train: 108000
